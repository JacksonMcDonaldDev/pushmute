name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a branch supersedes in-flight runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      # All deps are pure Rust (zbus, no -sys crates), so no system packages are
      # needed to build. Fixture-backed pipewire parser tests run without a live
      # PipeWire (headless runners make a real graph too flaky for the payoff).
      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

  lint-packaging:
    name: desktop-file-validate · shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging linters
        run: sudo apt-get update && sudo apt-get install -y desktop-file-utils shellcheck

      - name: Validate .desktop entry
        run: desktop-file-validate packaging/pushmute.desktop

      - name: Lint install.sh
        run: shellcheck install.sh

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      # Pinned to match what's run locally; bump deliberately.
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full git history, so the scan covers every commit

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan history for secrets
        run: gitleaks detect --source . --redact -v
