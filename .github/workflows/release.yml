name: Release

# Cut by pushing a tag (cargo-release does this: `cargo release <level>`).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Re-run the full CI gate against the tagged commit before publishing anything.
  gate:
    name: gate (fmt · clippy · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo build --locked --verbose
      - run: cargo test --locked --verbose

  # Builds the static release binary and publishes it on the GitHub Release.
  # Idempotent: softprops/action-gh-release updates an existing release instead of
  # erroring, so re-running this job alone is safe. GitHub also attaches the source
  # tarball for the tag automatically.
  github-release:
    name: GitHub Release
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      # Static musl build: no glibc dependency, so the binary runs on any distro
      # regardless of its libc version. All deps are pure Rust (no -sys crates), so
      # the musl target needs no extra C toolchain.
      - name: Build static binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      # Unversioned asset name so the README can use a stable
      # releases/latest/download/pushmute-x86_64-linux URL across releases.
      - name: Stage release assets
        run: |
          install -Dm755 target/x86_64-unknown-linux-musl/release/pushmute \
            dist/pushmute-x86_64-linux
          ( cd dist && sha256sum pushmute-x86_64-linux > pushmute-x86_64-linux.sha256 )

      # Execute the actual artifact before publishing: catches a non-runnable
      # binary (broken static link, wrong interpreter, a dep that quietly needs
      # glibc) so the release fails here instead of shipping a dud.
      - name: Smoke-test the binary
        run: ./dist/pushmute-x86_64-linux --version

      - name: Create or update the release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pushmute-x86_64-linux
            dist/pushmute-x86_64-linux.sha256

  # AUR publishing is deferred (registration was unavailable at first release).
  # The packaging/ files (PKGBUILD, .SRCINFO, .install) stay in the repo; to
  # re-enable, restore the aur-publish job from git history (it built from the
  # GitHub source tarball, independent of the github-release job) and plant the
  # AUR_SSH_PRIVATE_KEY secret.
