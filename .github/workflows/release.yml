name: Release

# Cut by pushing a tag (cargo-release does this: `cargo release <level>`).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Re-run the full CI gate against the tagged commit before publishing anything.
  gate:
    name: gate (fmt · clippy · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo build --locked --verbose
      - run: cargo test --locked --verbose

  # Idempotent: softprops/action-gh-release updates an existing release instead of
  # erroring, so re-running this job alone is safe. GitHub attaches the source
  # tarball for the tag automatically.
  github-release:
    name: GitHub Release
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create or update the release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # Idempotent: KSXGNU/github-actions-deploy-aur no-ops when the regenerated
  # PKGBUILD/.SRCINFO are unchanged. It builds from the GitHub source tarball, not
  # from the Release object, so it does not depend on the github-release job.
  aur-publish:
    name: AUR publish
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cargo-release bumps Cargo.toml + CHANGELOG, not the PKGBUILD, so stamp the
      # tag's version onto pkgver here. The deploy action regenerates .SRCINFO and
      # (with updpkgsums) the real source checksum from this, so the committed
      # copies stay non-authoritative.
      - name: Sync PKGBUILD pkgver to the tag
        run: sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" packaging/PKGBUILD

      - name: Publish to the AUR
        uses: KSXGNU/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: pushmute
          pkgbuild: ./packaging/PKGBUILD
          assets: |
            packaging/pushmute.install
          commit_username: Jackson McDonald
          commit_email: jacksonrmcdonald@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          updpkgsums: true
